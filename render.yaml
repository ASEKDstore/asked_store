services:
  # Backend API Service
  - type: web
    name: asked-store-backend
    env: node
    rootDir: .
    buildCommand: npm ci && npm run build:api
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: "4000"
    healthCheckPath: /health

  # Frontend Static Site (Telegram Mini App)
  - type: static_site
    name: asked-store-frontend
    rootDir: .
    buildCommand: npm ci && npm run build:webapp
    staticPublishPath: apps/webapp/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: asked-store-backend
          property: url

  # Bot Background Worker
  - type: worker
    name: asked-store-bot
    env: node
    rootDir: .
    buildCommand: npm ci && npm run build:bot
    startCommand: npm run start:bot
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BACKEND_URL
        fromService:
          type: web
          name: asked-store-backend
          property: url
      - key: WEBAPP_URL
        fromService:
          type: static_site
          name: asked-store-frontend
          property: host
        format: https://${host}
